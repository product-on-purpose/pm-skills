# Sub-agent + slash command pairings.
#
# Every sub-agent in this directory ships with a companion slash command in
# commands/ per master plan D6. This manifest declares the pairing.
#
# Authored as part of subagents-integration-plan.md Phase 1 Task 1 per D29.
# Read by scripts/check-sub-agent-command-pair.{sh,ps1} (ci-plan Phase 2 Task 4)
# to validate that every entry below has a corresponding commands/{verb}.md file.

pairings:
  pm-critic:
    commands: [critic]
  pm-skill-auditor:
    commands: [audit-repo]
  pm-changelog-curator:
    commands: [draft-changelog]
  pm-release-conductor:
    commands: [release]
