name: Sync AGENTS.md

# DISABLED auto-trigger (v2.14.x V7; 2026-05-10).
# HARDENED workflow_dispatch (v2.14.2; 2026-05-10).
#
# This workflow auto-generated AGENTS.md by walking `skills/$phase/*/`
# (nested phase-directory structure). pm-skills uses a flat
# `skills/{phase-prefix}-{name}/` structure instead, so the generation
# step produced an empty AGENTS.md and the auto-commit-then-push step
# failed for two reasons: (1) push to main blocked by branch protection
# rules; (2) the generated AGENTS.md would have gutted the hand-authored
# content that contributors actively maintain.
#
# Has been failing on every skills/** push since at least 2026-04-23.
# V7 disabled the auto-trigger; v2.14.2 additionally hardens the manual
# dispatch path with two defense layers:
#   (a) Input gate: workflow runs as a dry-run by default. Commit/push
#       step is gated behind an explicit `apply: true` input choice.
#   (b) Token gate: job-level `contents: read` ensures the GITHUB_TOKEN
#       cannot push even if the input gate is bypassed. A future revival
#       must bump permissions to `contents: write` via PR (visible code
#       change reviewable in source control).
#
# AGENTS.md remains hand-authored as a canonical contributor-facing
# document. Do NOT set `apply: true` until the generation step is
# rewritten to walk the flat `skills/{phase-prefix}-{name}/` structure.
#
# To revive: rewrite the workflow's generation step to walk the flat
# skills/{phase-prefix}-{name}/ structure (parse the prefix to determine
# phase), confirm the output matches the hand-authored AGENTS.md shape,
# and reinstate the push trigger via PR (so branch protection cooperates).
# v2.15+ scope.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Commit and push the regenerated AGENTS.md. Default false (dry-run). DO NOT set true until the generation step is rewritten for the flat skills/ structure."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate AGENTS.md
        run: |
          cat > AGENTS.md << 'HEADER'
          # PM-Skills

          > Open source Product Management skills for AI agents

          This repository contains professional PM skills organized by the Triple Diamond framework. Each skill helps AI agents produce high-quality PM artifacts.

          ## Skills

          HEADER

          # Process each phase
          for phase in discover define develop deliver measure iterate; do
            phase_title=$(echo "$phase" | sed 's/.*/\u&/')
            echo "### ${phase_title} Phase" >> AGENTS.md
            echo "" >> AGENTS.md

            # Find all skills in this phase
            for skill_dir in skills/$phase/*/; do
              if [ -f "${skill_dir}SKILL.md" ]; then
                skill_name=$(basename "$skill_dir")

                # Extract description from frontmatter
                description=$(sed -n '/^description:/p' "${skill_dir}SKILL.md" | sed 's/description: //')

                echo "#### $skill_name" >> AGENTS.md
                echo "**Path:** \`${skill_dir}SKILL.md\`" >> AGENTS.md
                echo "" >> AGENTS.md
                echo "$description" >> AGENTS.md
                echo "" >> AGENTS.md
              fi
            done

            echo "---" >> AGENTS.md
            echo "" >> AGENTS.md
          done

          # Add workflows section
          cat >> AGENTS.md << 'WORKFLOWS'
          ## Workflows

          | Workflow | Description |
          |----------|-------------|
          | [Triple Diamond](_workflows/triple-diamond.md) | Complete product development cycle |
          | [Lean Startup](_workflows/lean-startup.md) | Build-Measure-Learn rapid iteration |
          | [Feature Kickoff](_workflows/feature-kickoff.md) | Quick-start workflow for features |
          | [Customer Discovery](_workflows/customer-discovery.md) | Transform raw research into a validated problem |
          | [Sprint Planning](_workflows/sprint-planning.md) | Prepare sprint-ready stories from a backlog |
          | [Product Strategy](_workflows/product-strategy.md) | Frame a major strategic initiative |
          | [Post-Launch Learning](_workflows/post-launch-learning.md) | Measure results and capture learnings after launch |
          | [Stakeholder Alignment](_workflows/stakeholder-alignment.md) | Build a case for leadership buy-in |
          | [Technical Discovery](_workflows/technical-discovery.md) | Evaluate technical feasibility and architecture |

          ---

          ## Commands

          | Command | Description |
          |---------|-------------|
          WORKFLOWS

          # Add commands
          for cmd in commands/*.md; do
            if [ -f "$cmd" ]; then
              cmd_name=$(basename "$cmd" .md)
              desc=$(sed -n '/^description:/p' "$cmd" | sed 's/description: //')
              echo "| \`/$cmd_name\` | $desc |" >> AGENTS.md
            fi
          done

          cat >> AGENTS.md << 'FOOTER'

          ---

          ## License

          Apache-2.0

          ---

          *Built by [Product on Purpose](https://github.com/product-on-purpose) for PMs who ship.*
          FOOTER

      - name: Check for changes (dry-run diff)
        id: git-check
        run: |
          if git diff --exit-code AGENTS.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected against checked-in AGENTS.md."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "::warning::Generated AGENTS.md differs from checked-in version. Review the diff above before re-dispatching with apply: true."
          fi

      - name: Refuse commit/push without explicit apply input
        if: github.event.inputs.apply != 'true'
        run: |
          echo "Dry-run mode: apply=${{ github.event.inputs.apply }}. Skipping commit and push."
          echo "The generation step uses a stale glob (skills/\$phase/*/) and would overwrite hand-authored AGENTS.md."
          echo "To attempt a real write: re-dispatch with apply: true (only after the generation step is rewritten)."

      - name: Commit changes (apply mode)
        if: steps.git-check.outputs.changed == 'true' && github.event.inputs.apply == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::warning::apply: true requested. The current generation step is known broken (stale glob); branch protection on main will reject the push. This step is wired for a future rewrite, not for current use."
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add AGENTS.md
          git commit -m "chore: sync AGENTS.md with skills inventory"
          git push
