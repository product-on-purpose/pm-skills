name: Deploy to GitHub Pages

# v2.14.0 W11 cutover landed via flipping the Pages source from
# "Deploy from a branch > gh-pages" to "GitHub Actions" in repo
# Settings > Pages. After the flip, this workflow's last successful
# deployment IS production.
#
# DM-2 deviation: plan recommended the all-in-one withastro/action,
# but our npm run build chains a Phase 2 post-build sweep
# (scripts/post-build-strip-md-links.mjs, the Codex P0 fix) that the
# all-in-one action would skip because it runs astro build directly
# with no custom-script hook. Composable steps (setup-node + npm ci +
# npm run build + upload-pages-artifact + deploy-pages) preserve the
# chain.
#
# Triggers: push to main (auto-deploy) and workflow_dispatch (manual).
# Concurrency group "pages" with cancel-in-progress: false so a slower
# in-flight deploy is not interrupted by a newer trigger.
#
# Rollback path: flip Pages source back to "Deploy from a branch >
# gh-pages" to serve the last gh-pages build (a static fossil from
# before the v2.14 doc-stack cutover).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build site (Astro Starlight + Phase 2 post-build sweep)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
