name: Validate MCP Sync

on:
  pull_request:
    paths:
      - "skills/**"
      - "commands/**"
      - ".github/scripts/validate-mcp-sync.js"
      - ".github/workflows/validate-mcp-sync.yml"
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "commands/**"
      - ".github/scripts/validate-mcp-sync.js"
      - ".github/workflows/validate-mcp-sync.yml"
  workflow_dispatch:
    inputs:
      mode:
        description: "Validation mode: observe or block"
        required: false
        default: "observe"

permissions:
  contents: read

jobs:
  validate-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pm-skills
        uses: actions/checkout@v5
        with:
          path: pm-skills

      - name: Checkout pm-skills-mcp
        uses: actions/checkout@v5
        with:
          repository: product-on-purpose/pm-skills-mcp
          path: pm-skills-mcp

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.12'
          cache: npm
          cache-dependency-path: pm-skills-mcp/package-lock.json

      - name: Install pm-skills-mcp dependencies
        working-directory: pm-skills-mcp
        run: npm ci

      # M-22 maintenance-mode posture: pm-skills-mcp catalog is frozen at
      # v2.9.2. embed-skills.js hard-fails (EMB-004) on classifications
      # added after the freeze (e.g., classification: tool added in v2.15.0).
      # Both steps below are advisory under M-22: drift surfaces in logs
      # but does not block PRs. Companion soft-fail at
      # pm-skills-mcp/scripts/embed-skills.js (Layer 2 change shipped
      # alongside this Layer 1 change in v2.16.0-doc-stack).
      - name: Embed skills snapshot in pm-skills-mcp for comparison
        continue-on-error: true
        env:
          PM_INCLUDE_PERSONAS: "false"
        run: node pm-skills-mcp/scripts/embed-skills.js ./pm-skills/skills

      - name: Validate sync status (observe default; maintenance mode posture)
        continue-on-error: true
        env:
          PM_SKILLS_PATH: ./pm-skills
          PM_SKILLS_MCP_PATH: ./pm-skills-mcp
          # Default mode flipped from 'block' to 'observe' on 2026-05-10
          # (v2.14.x V9) per the MCP maintenance-mode posture (M-22
          # decision; v2.9.2 announcement). Drift is expected and accepted;
          # the validator reports it for visibility but does not fail CI.
          # See pm-skills CONTRIBUTING.md MCP Sync Guardrail section.
          # 2026-05-17 (v2.16.0-doc-stack): added explicit continue-on-error
          # to complete the maintenance-mode posture. Observe-mode was only
          # on this validator step before; the upstream embed hard-fail
          # prevented this validator from running on v2.15+ taxonomy.
          VALIDATE_MCP_SYNC_MODE: ${{ github.event.inputs.mode || 'observe' }}
        run: node pm-skills/.github/scripts/validate-mcp-sync.js
