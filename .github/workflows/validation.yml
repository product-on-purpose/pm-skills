name: Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node (pin from .nvmrc)
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: Install validator-tooling dependencies (root)
        # Root package.json provides js-yaml for scripts/check-frontmatter-yaml.mjs
        # (used by lint-skills-frontmatter). The docs-site deps install separately in site/.
        run: npm ci

      - name: Install Astro/Starlight dependencies
        working-directory: site
        run: npm ci

      - name: Generate site content
        # Generated content is gitignored and rebuilt each build, so it is absent
        # on a fresh checkout. Generate it here (zero-dependency Node, no node_modules
        # needed) so the content-scanning validators below see the full tree.
        run: node scripts/gen-site.mjs

      - name: Validate commands (bash)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/validate-commands.sh

      - name: Validate commands (pwsh)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/validate-commands.ps1

      - name: Validate AGENTS.md sync (bash)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/validate-agents-md.sh

      - name: Validate AGENTS.md sync (pwsh)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/validate-agents-md.ps1

      - name: Lint skills front matter (bash)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/lint-skills-frontmatter.sh

      - name: Lint skills front matter (pwsh)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/lint-skills-frontmatter.ps1

      - name: Check skill sample coverage (bash)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/check-skill-sample-coverage.sh

      - name: Check skill sample coverage (pwsh)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/check-skill-sample-coverage.ps1

      - name: Validate meeting-skills-family contract (bash)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/validate-meeting-skills-family.sh

      - name: Validate meeting-skills-family contract (pwsh)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/validate-meeting-skills-family.ps1

      - name: Validate foundation-sprint-skills-family contract (bash, --strict)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/validate-foundation-sprint-skills-family.sh --strict

      - name: Validate foundation-sprint-skills-family contract (pwsh, -Strict)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/validate-foundation-sprint-skills-family.ps1 -Strict

      - name: Validate design-sprint-skills-family contract (bash, --strict)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/validate-design-sprint-skills-family.sh --strict

      - name: Validate design-sprint-skills-family contract (pwsh, -Strict)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/validate-design-sprint-skills-family.ps1 -Strict

      - name: Check MCP impact (bash)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/check-mcp-impact.sh
        continue-on-error: true

      - name: Check MCP impact (pwsh)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/check-mcp-impact.ps1
        continue-on-error: true

      - name: Check CONTEXT.md currency (bash)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/check-context-currency.sh
        continue-on-error: true

      - name: Check CONTEXT.md currency (pwsh)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/check-context-currency.ps1
        continue-on-error: true

      - name: Validate skill HISTORY.md (bash)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/validate-skill-history.sh
        continue-on-error: true

      - name: Validate skill HISTORY.md (pwsh)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/validate-skill-history.ps1
        continue-on-error: true

      - name: Validate skills manifest (bash)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/validate-skills-manifest.sh
        continue-on-error: true

      - name: Validate skills manifest (pwsh)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/validate-skills-manifest.ps1
        continue-on-error: true

      - name: Validate version consistency (bash)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/validate-version-consistency.sh

      - name: Validate version consistency (pwsh)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/validate-version-consistency.ps1
      - name: Validate Codex manifest (bash)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/validate-codex-manifest.sh

      - name: Validate Codex manifest (pwsh)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/validate-codex-manifest.ps1

      - name: Validate plugin install path (bash, enforcing)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/validate-plugin-install.sh

      - name: Validate plugin install path (pwsh, enforcing)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/validate-plugin-install.ps1

      - name: Validate _pm-skills/ in .gitignore (bash)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/validate-gitignore-pm-skills.sh
        continue-on-error: true

      - name: Validate _pm-skills/ in .gitignore (pwsh)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/validate-gitignore-pm-skills.ps1
        continue-on-error: true

      - name: Validate script documentation (bash, enforcing)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/validate-script-docs.sh

      - name: Validate script documentation (pwsh, enforcing)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/validate-script-docs.ps1

      - name: Check workflow coverage (bash)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/check-workflow-coverage.sh
        continue-on-error: true

      - name: Check workflow coverage (pwsh)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/check-workflow-coverage.ps1
        continue-on-error: true

      - name: Check count consistency (bash)
        if: matrix.os == 'ubuntu-latest'
        run: bash scripts/check-count-consistency.sh

      - name: Check count consistency (pwsh)
        if: matrix.os == 'windows-latest'
        run: pwsh -File scripts/check-count-consistency.ps1

      - name: Check version references (bash)
        if: always() && matrix.os == 'ubuntu-latest'
        run: bash scripts/check-version-references.sh
        continue-on-error: true

      - name: Check version references (pwsh)
        if: always() && matrix.os == 'windows-latest'
        run: pwsh -File scripts/check-version-references.ps1
        continue-on-error: true

      - name: Validate docs frontmatter (bash, enforcing)
        if: always() && matrix.os == 'ubuntu-latest'
        run: bash scripts/validate-docs-frontmatter.sh --strict

      - name: Validate docs frontmatter (pwsh, enforcing)
        if: always() && matrix.os == 'windows-latest'
        run: pwsh -File scripts/validate-docs-frontmatter.ps1 -Strict

      - name: Validate skill family registration (bash, enforcing)
        if: always() && matrix.os == 'ubuntu-latest'
        run: bash scripts/validate-skill-family-registration.sh

      - name: Validate skill family registration (pwsh, enforcing)
        if: always() && matrix.os == 'windows-latest'
        run: pwsh -File scripts/validate-skill-family-registration.ps1

      # Filesystem link validators (check-internal-link-validity,
      # validate-references-cross-doc) were retired in the Pattern S migration:
      # they resolve .md links on disk, which cannot represent the cross-target
      # links (../../skills/SKILL.md, ../internal/, _workflows/) that now resolve
      # only at build time via scripts/remark-resolve-links.mjs. The build-aware
      # "Check rendered link resolution" step below validates the real dist and is
      # a strict superset.

      - name: Check no body H1 duplication (bash, enforcing)
        if: always() && matrix.os == 'ubuntu-latest'
        run: bash scripts/check-no-body-h1.sh --strict

      - name: Check no body H1 duplication (pwsh, enforcing)
        if: always() && matrix.os == 'windows-latest'
        run: pwsh -File scripts/check-no-body-h1.ps1 -Strict

      - name: Check skill cross-references (bash, enforcing)
        if: always() && matrix.os == 'ubuntu-latest'
        run: bash scripts/check-skill-cross-references.sh

      - name: Check skill cross-references (pwsh, enforcing)
        if: always() && matrix.os == 'windows-latest'
        run: pwsh -File scripts/check-skill-cross-references.ps1

      # v2.15.1 preventive validators - close audit findings A01/A02/A03/A04
      - name: Check landing-page counts (bash, enforcing, --strict)
        if: always() && matrix.os == 'ubuntu-latest'
        run: bash scripts/check-landing-page-counts.sh --strict

      - name: Check landing-page counts (pwsh, enforcing, -Strict)
        if: always() && matrix.os == 'windows-latest'
        run: pwsh -File scripts/check-landing-page-counts.ps1 -Strict

      - name: Check workflow generator coverage (bash, enforcing)
        if: always() && matrix.os == 'ubuntu-latest'
        run: bash scripts/check-workflow-generator-coverage.sh

      - name: Check workflow generator coverage (pwsh, enforcing)
        if: always() && matrix.os == 'windows-latest'
        run: pwsh -File scripts/check-workflow-generator-coverage.ps1

      - name: Check AGENTS.md command-sync (bash, enforcing)
        if: always() && matrix.os == 'ubuntu-latest'
        run: bash scripts/check-agents-md-command-sync.sh

      - name: Check AGENTS.md command-sync (pwsh, enforcing)
        if: always() && matrix.os == 'windows-latest'
        run: pwsh -File scripts/check-agents-md-command-sync.ps1

      - name: Build site with Astro Starlight (enforcing)
        if: always()
        working-directory: site
        run: npm run build

      - name: Check internal/ exclusion from dist (bash, enforcing)
        if: always() && matrix.os == 'ubuntu-latest'
        run: |
          leaks=$(find site/dist/ -path '*internal*' -type f 2>/dev/null)
          if [ -n "$leaks" ]; then
            echo "FAIL: internal/ paths leaked into site/dist/:"
            echo "$leaks" | head -10
            exit 1
          fi
          echo "PASS: no internal/ paths in site/dist/"

      - name: Check internal/ exclusion from dist (pwsh, enforcing)
        if: always() && matrix.os == 'windows-latest'
        run: |
          $leaks = Get-ChildItem -Path site/dist -Recurse -File -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match 'internal' }
          if ($leaks.Count -gt 0) {
            Write-Output "FAIL: internal/ paths leaked into site/dist/: $($leaks.Count) files"
            $leaks | Select-Object -First 10 | ForEach-Object { Write-Output $_.FullName }
            exit 1
          }
          Write-Output "PASS: no internal/ paths in site/dist/"

      - name: Verify edit-link resolution (enforcing)
        if: always()
        run: node scripts/verify-edit-links.mjs site/dist .

      - name: Check rendered link resolution + anchors (enforcing)
        if: always()
        env:
          STRICT_ANCHORS: '1'
        run: node scripts/check-rendered-links.mjs site/dist

      - name: Check route parity (enforcing; no published URL removed without a redirect)
        if: always()
        run: node scripts/check-route-parity.mjs site/dist
